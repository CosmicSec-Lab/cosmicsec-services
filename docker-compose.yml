      start_period: 25s

  # ── Rust Ingest Engine ───────────────────────────────────────────
  ingest:
    build:
      context: ./ingest
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://cosmicsec:${POSTGRES_PASSWORD:-devpass}@postgres:5432/cosmicsec
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8099:8099"
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8099/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  mongo_data:
