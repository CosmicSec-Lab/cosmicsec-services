repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-redis
          - types-python-jose
          - types-passlib
          - types-pyyaml
          - types-cryptography
          - types-requests
        args: [--ignore-missing-imports, services/]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.0
    hooks:
      - id: gitleaks
        description: Detect hardcoded secrets

  - repo: local
    hooks:
      - id: pytest-quick
        name: Quick tests
        entry: pytest tests/ -v --tb=short -x
        language: system
        pass_filenames: false
        types: [python]
